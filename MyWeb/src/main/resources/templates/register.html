<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>學生註冊</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="page-shell page-shell--narrow">
<div class="form-panel register-container">
    <h2>學生註冊</h2>

    <!-- 顯示 Bean Validation 錯誤訊息清單 -->
    <ul class="alert-list">
        <li th:each="error : ${#fields.errors('person.*')}"
            th:classappend="${error.contains('already exists') ? 'email-error' : 'alert'}"
            th:text="${error}">
        </li>
    </ul>

    <!-- 表單內容 -->
    <form th:action="@{/public/createUser}" method="post" th:object="${person}">
        <!-- CSRF Token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-field">
            <label for="name">姓名：<span class="required-asterisk">*</span></label>
            <input class="form-field__control" type="text" th:field="*{name}" id="name" required/>
        </div>
        <div class="form-field">
            <label for="mobile">手機號碼：<span class="required-asterisk">*</span></label>
            <input class="form-field__control" type="text" th:field="*{mobile}" id="mobile" required/>
        </div>
        <div class="form-field">
            <label for="email">電子郵件：<span class="required-asterisk">*</span></label>
            <input class="form-field__control" type="email" th:field="*{email}" id="email" required/>
        </div>
        <div class="form-field">
            <label for="confirmEmail">確認電子郵件：</label>
            <input class="form-field__control" type="email" th:field="*{confirmEmail}" id="confirmEmail" required/>
        </div>
        <div class="form-field">
            <label for="password">密碼：<span class="required-asterisk">*</span></label>
            <input class="form-field__control" type="password" th:field="*{password}" id="password" required/>
        </div>
        <div class="form-field">
            <label for="confirmPassword">確認密碼：</label>
            <input class="form-field__control" type="password" th:field="*{confirmPassword}" id="confirmPassword" required/>
        </div>
        <div class="form-actions">
            <button class="button button--primary" type="submit"><i class="fa-solid fa-user-plus" aria-hidden="true"></i> 註冊</button>
        </div>
    </form>
</div>
</main>

<!--registerDescription.html-->
<div th:insert="~{text/registerDescription :: registerDescriptionFrag}"></div>

</body>
</html>
