<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>News</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
    <link rel="stylesheet" th:href="@{/css/news.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<!-- 新聞內容 -->
<div class="news-container">
    <h1>Latest News</h1>

    <!-- 顯示每則新聞 -->
    <div th:each="newsItem : ${newsList}" class="news-item">
        <h2 th:text="${newsItem.title}"></h2>
        <p><em th:text="${newsItem.releasedDate}"></em></p>
        <p th:text="${newsItem.content}"></p>
    </div>
</div>

<!--newsDescription.html-->
<div th:insert="~{text/newsDescription :: NewsDescriptionFrag}"></div>

</body>
</html>
