<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>最新消息</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<!-- 新聞內容 -->
<main class="page-shell">
<div class="news-container">
    <h1>最新消息</h1>

    <!-- 顯示每則新聞 -->
    <div class="news-list">
    <article th:each="newsItem : ${newsList}" class="news-item">
        <h2 th:text="${newsItem.title}"></h2>
        <p><em th:text="${newsItem.releasedDate}"></em></p>
        <p th:text="${newsItem.content}"></p>
    </article>
    </div>
</div>
</main>

<!--newsDescription.html-->
<div th:insert="~{text/newsDescription :: NewsDescriptionFrag}"></div>

</body>
</html>
