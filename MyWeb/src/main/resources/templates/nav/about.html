<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>About Us</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}"></div>

<!-- 關於頁內容 -->
<main class="page-shell">
    <div class="about-layout">
        <div>
            <h1>About SpringWise</h1>
            <p>Welcome to our website! We are passionate about delivering quality content and services.
                Our team is dedicated to continuous improvement and customer satisfaction. Whether you’re
                here to learn more about us or to explore what we offer, we’re glad to have you on board.</p>
        </div>
        <img class="about-layout__image" th:src="@{/images/aboutUs.jpg}" alt="Passion led us here">
    </div>
</main>

<!-- 關於頁說明 fragment -->
<div th:insert="~{text/aboutDescription :: AboutDescriptionFrag}"></div>

</body>
</html>
