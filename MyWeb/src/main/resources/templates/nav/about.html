<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>About Us</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
    <link rel="stylesheet" th:href="@{/css/about.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}"></div>

<!-- 關於頁內容 -->
<div class="container">
    <h1>About Us</h1>
    <!-- 靜態資源 root = localhost:8081 -->
    <img th:src="@{/images/aboutUs.jpg}" alt="About Us Image">
    <p>
        Welcome to our website! We are passionate about delivering quality content and services.
        Our team is dedicated to continuous improvement and customer satisfaction. Whether you’re
        here to learn more about us or to explore what we offer, we’re glad to have you on board.
    </p>
</div>

<!-- 關於頁說明 fragment -->
<div th:insert="~{text/aboutDescription :: AboutDescriptionFrag}"></div>

</body>
</html>
