<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>聯絡我們</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>

<body>
<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>


<main class="page-shell page-shell--narrow">

    <!-- 驗證錯誤訊息 -->
    <ul class="alert-list">
        <!-- #fields.errors(...) 是 Thymeleaf 工具，回傳指定 field 的驗證錯誤訊息清單 -->
        <li class="alert alert--error" th:each="error : ${#fields.errors('contact.*')}"
            th:text="${error}"></li>
    </ul>

    <!-- 表單內容 -->
    <form th:action="@{/saveMessage}" th:object="${contact}" method="post" class="form-panel contact-form">
        <h1>聯絡我們</h1>
        <label for="name">姓名：<span class="required-asterisk">*</span></label>
        <input class="form-field__control" type="text" id="name" th:field="*{name}" required>

        <label for="mobile">手機號碼：<span class="required-asterisk">*</span></label>
        <input class="form-field__control" type="tel" id="mobile" th:field="*{mobile}" required>

        <label for="email">電子郵件：<span class="required-asterisk">*</span></label>
        <input class="form-field__control" type="email" id="email" th:field="*{email}" required>

        <label for="subject">主旨：<span class="required-asterisk">*</span></label>
        <input class="form-field__control" type="text" id="subject" th:field="*{subject}" required>

        <label for="message">訊息內容：<span class="required-asterisk">*</span></label>
        <textarea class="form-field__control" id="message" th:field="*{message}" rows="4" required></textarea>

        <button class="button button--primary" type="submit"><i class="fa-solid fa-paper-plane" aria-hidden="true"></i> 送出</button>

        <!-- 成功訊息 -->
        <!-- 當 model 內含 "successfullySavedMessage" 才渲染 -->
        <!-- 若 "successfullySavedMessage" 為 null / false / 空字串，Thymeleaf 判定為 false 不渲染 -->
        <div th:if="${successfullySavedMessage}" id="success-message" class="alert alert--success">
            <p th:text="${successfullySavedMessage}"></p>
        </div>
    </form>
</main>

<!-- 聯絡頁說明區塊 -->
<div th:insert="text/contactDescription :: contactDescriptionFrag"></div>

</body>
</html>
