<!-- 導覽列的 Thymeleaf fragment -->
<!-- 啟用 Thymeleaf Spring Security 屬性（xmlns:sec） -->
<div th:fragment="navbarFrag" xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <nav class="site-nav" aria-label="Primary navigation">
        <div class="site-nav__inner">
            <a class="site-nav__brand" th:href="@{/home}">
                <span class="site-nav__brand-mark" aria-hidden="true">S</span>
                <span>SpringWise</span>
            </a>
            <button class="site-nav__toggle" type="button" data-nav-toggle
                    aria-expanded="false" aria-controls="site-navigation">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
                <span class="visually-hidden">Toggle navigation</span>
            </button>
            <div id="site-navigation" class="site-nav__menu" data-nav-menu>
                <div class="site-nav__group">
                    <a class="site-nav__link" th:href="@{/home}">Home</a>
                    <a class="site-nav__link" th:href="@{/about}">About</a>
                    <a class="site-nav__link" th:href="@{/news}">News</a>
                    <a class="site-nav__link" th:href="@{/contact}">Contact</a>
                    <a class="site-nav__link site-nav__link--accent" sec:authorize="isAuthenticated()" th:href="@{/dashboard}">Dashboard</a>
                </div>
                <div class="site-nav__group">
                    <a class="site-nav__link" sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
                    <a class="site-nav__link" sec:authorize="isAuthenticated()" th:href="@{/logout}">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <script src="https://kit.fontawesome.com/a75d89fa9f.js" crossorigin="anonymous"></script>
    <script th:src="@{/js/app.js}" defer></script>
</div>
