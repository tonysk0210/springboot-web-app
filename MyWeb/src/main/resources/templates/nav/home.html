<!DOCTYPE html>
<!-- 啟用 Thymeleaf 屬性（xmlns:th） -->
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SpringWise</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}"></div>

<main>
    <section class="hero" aria-labelledby="hero-title">
        <img class="hero__image" th:src="@{/images/aboutUs.jpg}" alt="一群人共同學習與交流">
        <div class="hero__content">
            <h1 id="hero-title" class="hero__title">SpringWise</h1>
            <p class="hero__copy">專注於 Spring Framework 的學習平台，透過引導式專案、專業觀點與實務應用，協助開發者建立扎實能力。</p>
        </div>
    </section>
</main>

<!-- 首頁說明 fragment -->
<div th:replace="~{text/homeDescription :: homeDescriptionFrag}"></div>

</body>
</html>
