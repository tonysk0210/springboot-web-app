<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="page-shell page-shell--narrow">
<div class="form-panel profile-container">
    <h1>Profile</h1>

    <!-- 驗證錯誤訊息 -->
    <ul class="alert-list" th:if="${#fields.hasErrors('profile.*')}">
        <li th:each="error : ${#fields.errors('profile.*')}"
            class="alert alert--error"
            th:text="${error}">
        </li>
    </ul>

    <!-- 更新成功訊息 -->
    <div class="alert alert--success" th:if="${param.updated}">
        Profile updated successfully
    </div>

    <!-- 表單內容 -->
    <form th:action="@{/updateProfile}" method="post" th:object="${profile}">
        <fieldset>
            <legend>Personal Details</legend>

            <div class="form-group">
                <label for="name">Name:<span class="required-asterisk">*</span></label>
                <input class="form-field__control" type="text" id="name" th:field="*{name}" required>
            </div>
            <div class="form-group">
                <label for="mobile">Mobile:<span class="required-asterisk">*</span></label>
                <input class="form-field__control" type="text" id="mobile" th:field="*{mobile}" required>
            </div>
            <div class="form-group">
                <label for="email">Email:<span class="required-asterisk">*</span></label>
                <input class="form-field__control" type="email" id="email" th:field="*{email}" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Address Details</legend>
            <div class="form-group">
                <label for="address1">Address Line 1:<span class="required-asterisk">*</span></label>
                <input class="form-field__control" type="text" id="address1" th:field="*{address1}" required>
            </div>
            <div class="form-group">
                <label for="address2">Address Line 2:</label>
                <input class="form-field__control" type="text" id="address2" th:field="*{address2}">
            </div>
            <div class="form-group">
                <label for="city">City:<span class="required-asterisk">*</span></label>
                <input class="form-field__control" type="text" id="city" th:field="*{city}" required>
            </div>
            <div class="form-group">
                <label for="zipCode">Zip Code:<span class="required-asterisk">*</span></label>
                <input class="form-field__control" type="text" id="zipCode" th:field="*{zipcode}" required>
            </div>
        </fieldset>
        <button type="submit" class="button button--primary"><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> Update</button>
    </form>
</div>

<!-- 返回 dashboard -->
<div class="back-to-dashboard-container">
    <a th:href="@{/dashboard}" class="back-to-dashboard">← Back to Dashboard</a>
</div>
</main>

<!-- 個人資料頁說明區塊 -->
<div th:insert="text/profileDescription :: profileDescriptionFrag"></div>

</body>
</html>
