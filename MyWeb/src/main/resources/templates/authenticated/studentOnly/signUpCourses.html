<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>可選課程</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="container">
    <h1>可選課程</h1>

    <!-- 顯示成功或錯誤訊息 -->
    <div class="alert alert--success" th:if="${param.success}">
        課程選購成功。
    </div>

    <div class="alert alert--error" th:if="${error}" th:text="'⚠️ '+ ${error}"></div> <!--model("error")-->

    <!-- 課程表 -->
    <div th:if="${courseList != null and !courseList.isEmpty()}">
        <form th:action="@{/student/purchaseSelectedCourse}" method="post">
            <div class="table-scroll">
            <table class="data-table">
                <thead>
                <tr>
                    <th>課程編號</th>
                    <th>課程名稱</th>
                    <th>費用</th>
                    <th>選擇</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courseList}">
                    <td th:text="${course.courseId}"></td>
                    <td><strong th:text="${course.name}"></strong></td>
                    <td th:text="'$ ' + ${course.fees}"></td>
                    <td>
                        <!-- 每個 checkbox 值即該 course 的 courseId
                             若 alreadyRegisteredCourses 已包含此 course，checkbox 設 disabled -->
                        <input type="checkbox" name="selectedCourses"
                               th:value="${course.courseId}"
                               th:disabled="${#lists.contains(alreadyRegisteredCourses, course)}"/>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
            <div class="submit-container">
                <button type="submit" class="button button--primary"><i class="fa-solid fa-cart-shopping" aria-hidden="true"></i> 選購所選課程</button>
            </div>
        </form>
    </div>

    <!-- 無課程訊息 -->
    <p class="info-message" th:unless="${courseList != null and !courseList.isEmpty()}">
        目前沒有可選課程。
    </p>

    <!-- 返回連結 -->
    <div class="back-to-dashboard-container">
        <a class="button button--secondary" th:href="@{/dashboard}">← 返回控制台</a>
    </div>
</main>

<!-- 選課頁說明區塊 -->
<div th:replace="~{text/signUpCoursesDescription :: signUpCoursesDescriptionFrag}">...</div>

</body>
</html>
