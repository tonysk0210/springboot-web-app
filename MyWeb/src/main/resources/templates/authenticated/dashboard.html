<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>控制台</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}"></div>

<!-- 頁首 -->
<main class="dashboard">
    <header class="dashboard__intro">
        <h1 th:text="${'歡迎，' + username}"></h1>
        <p th:text="${'目前角色：' + (#strings.contains(role, 'ADMIN') ? '管理員' : (#strings.contains(role, 'STUDENT') ? '學生' : role))}"></p>
        <div class="alert alert--info" th:if="${!#strings.isEmpty(plan)}"
             th:text="${'你目前使用「' + plan + '」方案。'}"></div>
    </header>

    <!-- 個人資料區塊 -->
    <div class="profile-section">
        <a th:href="@{/profilePage}"><i class="fa-regular fa-address-card"></i> 編輯個人資料</a>
    </div>

    <div class="divider"></div>

    <!-- 學生專屬區塊 -->
    <div class="section-block" sec:authorize="hasRole('ROLE_STUDENT')">
        <a th:href="@{/student/viewEnrolledCourses}"><i class="fa-solid fa-list-ul"></i> 查看已選課程</a>
        <a th:href="@{/student/signUpCourses}"><i class="fa-solid fa-user-plus"></i> 選修課程</a>
    </div>

    <!-- 管理員專屬區塊 -->
    <div class="section-block" sec:authorize="hasRole('ROLE_ADMIN')">
        <a th:href="@{/admin/viewContactMessage/page/1(sortField='name', sortDir='asc')}"><i class="fa-solid fa-envelope"></i> 查看聯絡訊息</a>
        <a th:href="@{/admin/planPage}"><i class="fa-solid fa-clipboard"></i> 管理方案</a>
        <a th:href="@{/admin/coursePage}"><i class="fa-solid fa-book-open"></i> 管理課程</a>
    </div>
</main>

<!-- Dashboard 頁說明區塊 -->
<div th:insert="text/dashboardDescription :: dashboardDescriptionFrag"></div>

</body>
</html>
