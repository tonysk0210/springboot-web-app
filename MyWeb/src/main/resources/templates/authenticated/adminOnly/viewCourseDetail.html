<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Students</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="container">
    <!-- 頁首 -->
    <div class="page-header">
        <h1 th:text="'Course: ' + ${course.name} + ' - Student List'"></h1> <!--model("course")-->
        <button class="button button--primary" type="button" data-dialog-open="classModal"><i class="fa-solid fa-user-plus" aria-hidden="true"></i> Add Student</button>
    </div>

    <!-- 驗證錯誤訊息 -->
    <!-- param.error 回傳 String[]；${param} 是 Map<String, String[]> -->
    <div class="alert alert--error" th:if="${param.error != null and param.error[0] == 'personNotFound'}">
        ⚠️ Student not found
    </div>
    <div class="alert alert--error" th:if="${param.error != null and param.error[0] == 'alreadyEnrolled'}">
        ⚠️ Student is already enrolled in this course
    </div>

    <!-- 新增學生 Modal -->
    <dialog id="classModal" class="modal">
        <form method="post" th:action="@{/admin/addCourseStudent}" th:object="${person}" class="modal-form"> <!--model("person")-->
            <h2>Add New Student</h2>

            <label for="studentEmail">Student Email:</label>
            <input type="text" id="studentEmail" th:field="*{email}" required placeholder="e.g. student@example.com"/>

            <div class="modal-actions">
                <button type="submit" class="button button--primary">Submit</button>
                <button type="button" class="button button--secondary" data-dialog-close>Cancel</button>
            </div>
        </form>
    </dialog>

    <!-- 顯示學生表 -->
    <section class="table-section">
        <table class="data-table">
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="person : ${course.persons}"> <!--model("course")-->
                <td th:text="${person.name}"></td>
                <td th:text="${person.email}"></td>
                <td th:text="${person.mobile}"></td>
                <td class="actions">
                    <a th:href="@{/admin/deleteCourseStudent(personId=${person.personId})}" class="button button--danger"
                       data-confirm="Are you sure you want to remove this student from the course?">
                        Remove
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <!-- 返回按鈕 -->
    <div class="back-to-dashboard-container">
        <a class="button button--secondary" th:href="@{/admin/coursePage}">← Back to Course Management</a>
    </div>
</main>

<!-- 課程詳情頁說明區塊 -->
<div th:replace="~{text/viewCourseDetailDescription :: viewCourseDetailDescriptionFrag}"></div>

</body>
</html>
