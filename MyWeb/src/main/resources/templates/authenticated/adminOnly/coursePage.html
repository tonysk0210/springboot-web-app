<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Courses Page</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
    <link rel="stylesheet" th:href="@{/css/coursePage.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="container">
    <div class="page-header">
        <h1>Course Management</h1>
        <button id="openModalBtn" class="add-button">＋ Add Course</button>
    </div>

    <!-- 新增課程的驗證錯誤訊息（透過 Courses 上的 @Valid 觸發）；#fields.hasErrors() 回 List<String> -->
    <ul class="error-list" th:if="${#fields.hasErrors('course.*')}">
        <li th:each="error : ${#fields.errors('course.*')}" th:text="${error}"></li>
    </ul>

    <!-- 新增課程 Modal -->
    <dialog id="courseModal" class="modal">
        <form method="post" th:action="@{/admin/addNewCourse}" th:object="${course}" class="modal-form"> <!--model("course")-->
            <h2>Create New Course</h2>

            <label for="CourseName">Course Name:<span class="asterisk">*</span></label>
            <input type="text" id="CourseName" th:field="*{name}" required/>

            <label for="CourseFees">Fees:<span class="asterisk">*</span></label>
            <input type="text" id="CourseFees" th:field="*{fees}" required/>

            <div class="modal-actions">
                <button type="submit" class="submit-btn">Submit</button>
                <button type="button" class="cancel-btn" onclick="document.getElementById('courseModal').close()">Cancel</button>
            </div>
        </form>
    </dialog>

    <!-- 顯示課程表 -->
    <section class="table-section">
        <table>
            <thead>
            <tr>
                <th>Course ID</th>
                <th>Name</th>
                <th>Fees</th>
                <th colspan="2">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="eachCourse : ${courseList}">  <!--model("courseList")-->
                <td th:text="${eachCourse.courseId}"></td>
                <td><strong th:text="${eachCourse.name}"></strong></td>
                <td th:text="'$ '+ ${eachCourse.fees}"></td>
                <td class="actions">
                    <div class="action-buttons">
                        <a th:href="@{/admin/viewCourseDetail(courseId=${eachCourse.courseId})}" class="view-link">View</a>
                        <a th:href="@{/admin/deleteCourse(courseId=${eachCourse.courseId})}" class="delete-link"
                           onclick="return confirm('Are you sure you want to delete this course?\nThis will remove all students from the course!')">Delete</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <!-- 返回按鈕 -->
    <div class="back-link">
        <a th:href="@{/dashboard}">← Back to Dashboard</a>
    </div>
</main>

<!-- 課程頁說明區塊 -->
<div th:replace="~{text/coursePageDescription :: coursePageDescriptionFrag}"></div>

<script>
    document.getElementById('openModalBtn').addEventListener('click', function () {
        document.getElementById('courseModal').showModal();
    });
</script>

</body>
</html>
