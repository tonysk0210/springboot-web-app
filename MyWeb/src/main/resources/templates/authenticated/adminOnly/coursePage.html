<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>課程管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="container">
    <div class="page-header">
        <h1>課程管理</h1>
        <button class="button button--primary" type="button" data-dialog-open="courseModal"><i class="fa-solid fa-plus" aria-hidden="true"></i> 新增課程</button>
    </div>

    <!-- 新增課程的驗證錯誤訊息（透過 Courses 上的 @Valid 觸發）；#fields.hasErrors() 回 List<String> -->
    <ul class="error-list" th:if="${#fields.hasErrors('course.*')}">
        <li th:each="error : ${#fields.errors('course.*')}" th:text="${error}"></li>
    </ul>

    <!-- 新增課程 Modal -->
    <dialog id="courseModal" class="modal">
        <form method="post" th:action="@{/admin/addNewCourse}" th:object="${course}" class="modal-form"> <!--model("course")-->
            <h2>建立新課程</h2>

            <label for="CourseName">課程名稱：<span class="asterisk">*</span></label>
            <input type="text" id="CourseName" th:field="*{name}" required/>

            <label for="CourseFees">費用：<span class="asterisk">*</span></label>
            <input type="text" id="CourseFees" th:field="*{fees}" required/>

            <div class="modal-actions">
                <button type="submit" class="button button--primary">送出</button>
                <button type="button" class="button button--secondary" data-dialog-close>取消</button>
            </div>
        </form>
    </dialog>

    <!-- 顯示課程表 -->
    <section class="table-section">
        <table class="data-table">
            <thead>
            <tr>
                <th>課程編號</th>
                <th>課程名稱</th>
                <th>費用</th>
                <th colspan="2">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="eachCourse : ${courseList}">  <!--model("courseList")-->
                <td th:text="${eachCourse.courseId}"></td>
                <td><strong th:text="${eachCourse.name}"></strong></td>
                <td th:text="'$ '+ ${eachCourse.fees}"></td>
                <td class="actions">
                    <div class="action-buttons">
                        <a th:href="@{/admin/viewCourseDetail(courseId=${eachCourse.courseId})}" class="button button--primary">查看</a>
                        <a th:href="@{/admin/deleteCourse(courseId=${eachCourse.courseId})}" class="button button--danger"
                           data-confirm="確定要刪除此課程嗎？這會同時移除所有學生與此課程的關聯。">刪除</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <!-- 返回按鈕 -->
    <div class="back-to-dashboard-container">
        <a class="button button--secondary" th:href="@{/dashboard}">← 返回控制台</a>
    </div>
</main>

<!-- 課程頁說明區塊 -->
<div th:replace="~{text/coursePageDescription :: coursePageDescriptionFrag}"></div>

</body>
</html>
