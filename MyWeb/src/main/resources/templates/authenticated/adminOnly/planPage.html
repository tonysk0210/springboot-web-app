<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Plan Management</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
    <link rel="stylesheet" th:href="@{/css/planPage.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="container">
    <!-- 頁面標題 -->
    <header class="page-header">
        <h1>Plan Management</h1>
        <button id="openModalBtn" class="add-button">＋ Add Plan</button>
    </header>

    <!-- 驗證錯誤訊息 -->
    <ul class="error-list" th:if="${#fields.hasErrors('plan.*')}">
        <li th:each="error : ${#fields.errors('plan.*')}" th:text="${error}"></li>
    </ul>

    <!-- 新增方案 Modal -->
    <dialog id="planModal" class="modal">
        <form method="post" th:action="@{/admin/addNewPlan}" th:object="${plan}" class="modal-form">
            <h2>Create New Plan</h2>

            <label for="planName">Plan Name:</label>
            <input type="text" id="planName" th:field="*{name}" required/>

            <div class="modal-actions">
                <button type="submit" class="submit-btn">Create</button>
                <button type="button" class="cancel-btn" onclick="document.getElementById('planModal').close()">Cancel</button>
            </div>
        </form>
    </dialog>

    <!-- 方案表 -->
    <section class="table-section">
        <h2>Current Plans</h2>
        <table>
            <thead>
            <tr>
                <th>Plan ID</th>
                <th>Plan Name</th>
                <th colspan="2">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="plan : ${planList}">
                <td th:text="${plan.planId}"></td>
                <td><strong th:text="${plan.name}"></strong></td>
                <td><a th:href="@{/admin/viewPlanDetail(planId=${plan.planId})}" class="view-link">View</a></td>
                <td><a th:href="@{/admin/deletePlan(planId=${plan.planId})}" class="delete-link"
                       onclick="return confirm('Are you sure you want to delete this Plan? This will remove all Students from the plan')">Delete</a></td>
            </tr>
            </tbody>
        </table>
    </section>

    <!-- 返回按鈕 -->
    <div class="back-to-dashboard-container">
        <a th:href="@{/dashboard}" class="back-to-dashboard">← Back to Dashboard</a>
    </div>
</main>

<!-- 方案頁說明區塊 -->
<div th:insert="text/planPageDescription :: planPageDescriptionFrag"></div>

<script>
    document.getElementById('openModalBtn').addEventListener('click', function () {
        document.getElementById('planModal').showModal();
    });
</script>

</body>
</html>
