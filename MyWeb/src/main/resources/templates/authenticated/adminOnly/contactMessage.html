<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>聯絡訊息</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<!-- 表格內容 -->
<div class="contact-message-container">
    <h1>聯絡訊息</h1>
    <div class="table-scroll">
    <table class="data-table data-table--contact-messages">
        <!-- 表頭 -->
        <thead>
        <tr>
            <th>
                <!--model("reversedSortDir")-->
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=contactId&sortDir=' + ${reversedSortDir}}">訊息編號
                    <span class="sort-symbol" th:text="${sortField == 'contactId' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=name&sortDir=' + ${reversedSortDir}}">姓名
                    <span class="sort-symbol" th:text="${sortField == 'name' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=mobile&sortDir=' + ${reversedSortDir}}">手機號碼
                    <span class="sort-symbol" th:text="${sortField == 'mobile' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=email&sortDir=' + ${reversedSortDir}}">電子郵件
                    <span class="sort-symbol" th:text="${sortField == 'email' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=subject&sortDir=' + ${reversedSortDir}}">主旨
                    <span class="sort-symbol" th:text="${sortField == 'subject' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=message&sortDir=' + ${reversedSortDir}}">訊息內容
                    <span class="sort-symbol" th:text="${sortField == 'message' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=status&sortDir=' + ${reversedSortDir}}">狀態
                    <span class="sort-symbol" th:text="${sortField == 'status' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=createdAt&sortDir=' + ${reversedSortDir}}">建立時間
                    <span class="sort-symbol" th:text="${sortField == 'createdAt' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>
                <a th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum} + '?sortField=createdBy&sortDir=' + ${reversedSortDir}}">建立者
                    <span class="sort-symbol" th:text="${sortField == 'createdBy' ? (sortDir == 'asc' ? '↑' : '↓') : '↑↓'}"></span></a>
            </th>
            <th>操作</th>
        </tr>
        </thead>
        <!-- Table body：顯示 Page<Contact> 內每筆聯絡訊息 -->
        <tbody>
        <tr th:each="contact : ${listOfContactsPerPage}"> <!--model("listOfContactsPerPage")-->
            <td th:text="${contact.contactId}" data-label="CONTACT_ID"></td>
            <td th:text="${contact.name}" data-label="NAME"></td>
            <td th:text="${contact.mobile}" data-label="MOBILE"></td>
            <td th:text="${contact.email}" data-label="EMAIL"></td>
            <td th:text="${contact.subject}" data-label="SUBJECT"></td>
            <td th:text="${contact.message}" data-label="MESSAGE"></td>
            <td th:text="${contact.status == 'OPEN' ? '待處理' : (contact.status == 'CLOSED' ? '已關閉' : contact.status)}" data-label="STATUS"></td>
            <td th:text="${contact.createdAt}" data-label="CREATED_AT"></td>
            <td th:text="${contact.createdBy}" data-label="CREATED_BY"></td>

            <!-- 關閉連結 -->
            <td data-label="ACTION">
                <a th:href="@{/admin/closeMessage(contactId=${contact.contactId}, currentPageNum=${currentPageNum}, sortField=${sortField}, sortDir=${sortDir})}"
                   data-confirm="確定要關閉這則訊息嗎？" class="button button--danger">關閉
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
    <br/>

    <!-- 分頁列 -->
    <div class="pagination-links">
        <!-- 上一頁：僅在 currentPageNum > 1 時顯示 -->
        <a th:if="${currentPageNum > 1}"
           th:href="@{'/admin/viewContactMessage/page/' + (${currentPageNum - 1}) + '?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">&laquo; 上一頁</a>

        <!-- 頁碼列：對每個 i in 1..totalPage 產生連結；currentPageNum 對應的頁不加連結。[[...]] 是 Thymeleaf 的 inline text 輸出 -->
        <span th:each="i: ${#numbers.sequence(1, totalPage)}">
            <a th:if="${currentPageNum != i}" th:href="@{'/admin/viewContactMessage/page/' + ${i}+'?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">[[${i}]]</a>
            <span th:unless="${currentPageNum != i}" class="current">[[${i}]]</span>
        </span>

        <!-- 下一頁：僅在 currentPage < totalPage 時顯示 -->
        <a th:if="${currentPageNum < totalPage}"
           th:href="@{'/admin/viewContactMessage/page/' + ${currentPageNum + 1}+'?sortField=' + ${sortField} + '&sortDir=' + ${sortDir}}">下一頁 &raquo;</a>
    </div>

    <!-- 返回 dashboard -->
    <div class="back-to-dashboard-container">
        <a th:href="@{/dashboard}" class="button button--secondary">← 返回控制台</a>
    </div>
</div>

<!-- 聯絡訊息頁說明區塊 -->
<div th:insert="text/contactMessageDescription :: contactMessageDescriptionFrag"></div>

</body>
</html>
