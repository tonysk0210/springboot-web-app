<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>方案詳細資料</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="container">
    <!-- 頁面標題 -->
    <div class="page-header">
        <h1 th:text="'方案：' + ${thePlan.name}"></h1> <!--model("thePlan")-->
        <button class="button button--primary" type="button" data-dialog-open="studentModal"><i class="fa-solid fa-user-plus" aria-hidden="true"></i> 新增學生</button>
    </div>

    <!-- 驗證錯誤訊息 -->
    <div class="alert alert--error" th:if="${param.error != null and param.error[0] == 'personNotFound'}">
        找不到學生，請輸入有效的電子郵件。
    </div>

    <h2>學生資料</h2>
    <!-- 新增學生 Modal -->
    <dialog id="studentModal" class="modal">
        <form method="post" th:action="@{/admin/addStudent}" th:object="${person}" class="modal-form"> <!--model("person")-->
            <h2>新增學生</h2>

            <label for="studentEmail">學生電子郵件：</label>
            <input type="text" id="studentEmail" th:field="*{email}" placeholder="例如：student@example.com" required/>

            <div class="modal-actions">
                <button type="submit" class="button button--primary">新增</button>
                <button type="button" class="button button--secondary" data-dialog-close>取消</button>
            </div>
        </form>
    </dialog>

    <!-- 表格內容 -->
    <section class="table-section">
        <table class="data-table">
            <thead>
            <tr>
                <th>姓名</th>
                <th>電子郵件</th>
                <th>手機號碼</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="person : ${thePlan.persons}"> <!--model("thePlan")-->
                <td th:text="${person.name}"></td>
                <td th:text="${person.email}"></td>
                <td th:text="${person.mobile}"></td>
                <td class="actions">
                    <a th:href="@{/admin/removeStudent(personId=${person.personId})}" class="button button--danger"
                       data-confirm="確定要移除此學生嗎？">移除</a>
                </td>
            </tr>

            </tbody>
        </table>
    </section>

    <!-- 返回連結 -->
    <div class="back-to-dashboard-container">
        <a class="button button--secondary" th:href="@{/admin/planPage}">← 返回方案管理</a>
    </div>
</main>

<!-- 方案詳情頁說明區塊 -->
<div th:replace="~{text/viewPlanDetailDescription :: planViewDetailDescriptionFrag}"></div>

</body>
</html>
