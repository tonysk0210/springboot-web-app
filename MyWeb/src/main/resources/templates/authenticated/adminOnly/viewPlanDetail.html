<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Plan Details</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<!-- 導覽列 fragment -->
<div th:replace="~{nav/navbar :: navbarFrag}">...</div>

<main class="container">
    <!-- 頁面標題 -->
    <div class="page-header">
        <h1 th:text="'Plan: ' + ${thePlan.name}"></h1> <!--model("thePlan")-->
        <button class="button button--primary" type="button" data-dialog-open="studentModal"><i class="fa-solid fa-user-plus" aria-hidden="true"></i> Add Student</button>
    </div>

    <!-- 驗證錯誤訊息 -->
    <div class="alert alert--error" th:if="${param.error != null and param.error[0] == 'personNotFound'}">
        ⚠️ Student not found. Please enter a valid email.
    </div>

    <h2>Student Information: </h2>
    <!-- 新增學生 Modal -->
    <dialog id="studentModal" class="modal">
        <form method="post" th:action="@{/admin/addStudent}" th:object="${person}" class="modal-form"> <!--model("person")-->
            <h2>Add New Student</h2>

            <label for="studentEmail">Student Email:</label>
            <input type="text" id="studentEmail" th:field="*{email}" placeholder="e.g. student@example.com" required/>

            <div class="modal-actions">
                <button type="submit" class="button button--primary">Add</button>
                <button type="button" class="button button--secondary" data-dialog-close>Cancel</button>
            </div>
        </form>
    </dialog>

    <!-- 表格內容 -->
    <section class="table-section">
        <table class="data-table">
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="person : ${thePlan.persons}"> <!--model("thePlan")-->
                <td th:text="${person.name}"></td>
                <td th:text="${person.email}"></td>
                <td th:text="${person.mobile}"></td>
                <td class="actions">
                    <a th:href="@{/admin/removeStudent(personId=${person.personId})}" class="button button--danger"
                       data-confirm="Are you sure you want to remove this student?">Remove</a>
                </td>
            </tr>

            </tbody>
        </table>
    </section>

    <!-- 返回連結 -->
    <div class="back-to-dashboard-container">
        <a class="button button--secondary" th:href="@{/admin/planPage}">← Back to Plan Management</a>
    </div>
</main>

<!-- 方案詳情頁說明區塊 -->
<div th:replace="~{text/viewPlanDetailDescription :: planViewDetailDescriptionFrag}"></div>

</body>
</html>
