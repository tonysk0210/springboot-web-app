spring.application.name=MyWeb
server.port=8081
################ Log 相關設定 ################
# Console log 輸出格式（Logback ANSI 顏色轉換器）：時間戳=綠、level=藍、thread=紅、logger 名稱=黃
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
################ H2 資料庫 DataSource ################
# 使用內嵌 H2 記憶體資料庫
# DB_CLOSE_DELAY=-1：保持 in-memory DB 存活直到 JVM 結束，避免所有連線關閉時 H2 銷毀資料庫（devtools restart / HikariCP 回收連線時尤其重要）
# DB_CLOSE_ON_EXIT=FALSE：JVM shutdown hook 不主動關 DB，交給 Spring 管
spring.datasource.url=jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# schema.sql 和 data.sql 的位置; 這裡使用 classpath:sql/schema.sql 和 classpath:sql/data.sql 作為 SQL 初始化腳本的位置 optional: 表示如果文件不存在則不會報錯
spring.sql.init.schema-locations=classpath:sql/schema.sql
spring.sql.init.data-locations=classpath:sql/data.sql

################ H2 Web Console ################
# 啟用 H2 Web Console，開發時可在瀏覽器 http://localhost:8081/h2-console 直接看資料表
# 需搭配 pom.xml 內 spring-boot-h2console 依賴才會生效（Boot 4 拆出獨立模組）
spring.h2.console.enabled=true
################ JPA / Hibernate ################
# ddl-auto=validate：Hibernate 只在啟動時「驗證」Entity 是否對應現有 schema（不動 DB 結構）
# 若欄位缺失/型別不符 → 應用直接啟動失敗，強迫 schema.sql 與 Entity 保持同步
# 適用情境：以 schema.sql 為 schema 唯一真相（此專案的策略）
spring.jpa.hibernate.ddl-auto=validate
# 停用 JPA 持久層階段的 Bean Validation（避免對加密後密碼再次驗證 confirmPassword 等欄位）
# 因為 MVC 層在註冊時已經先驗過一次，持久層再驗會誤判 encodedPassword 與 confirmPassword 不一致
spring.jpa.properties.javax.persistence.validation.mode=none
################ Spring Data REST ################
# 自動產生的 REST 端點與 HAL Explorer 統一放在 /spring-data-api 底下
spring.data.rest.basePath=/spring-data-api
################ Actuator ################
# 自訂 Actuator base path 為 /myWeb/actuator（預設是 /actuator）
management.endpoints.web.base-path=/myWeb/actuator
# 對外暴露所有 Actuator endpoint（生產環境請改為白名單，例：health,info,metrics）
management.endpoints.web.exposure.include=*
# Actuator 與 app 同 port（也可以獨立指定另一個 port 讓管理端口與業務端口分離）
management.server.port=8081
################ Spring Boot Admin Client（向 AdminActuator 註冊）################
# 是否啟用 SBA client：false = 不註冊、不 heartbeat（AdminActuator server 未啟動時可避免連線失敗 log 洗版）
# 想恢復監控時改為 true，並啟動 AdminActuator（port 8083）
spring.boot.admin.client.enabled=false
# AdminActuator server 位置
spring.boot.admin.client.url=http://localhost:8083
# 明確指定自己對外的 URL，避免 Java 自動偵測 hostname 時抓到 host.docker.internal / LAN IP，
# 導致 Admin server 連不回來檢查健康狀態
spring.boot.admin.client.instance.service-base-url=http://localhost:8081
spring.boot.admin.client.instance.management-base-url=http://localhost:8081
# Admin server 打回來查健康狀態時使用的 Basic Auth 帳號（放在 instance metadata）
spring.boot.admin.client.instance.metadata.user.name=admin@gmail.com
spring.boot.admin.client.instance.metadata.user.password=admin
################ 自訂應用程式屬性（前綴 myweb.*）################
# 綁定在 config/MyWebProperties，用 @Validated 檢查（範圍 5~10）
# 目前用於後台聯絡訊息分頁每頁筆數
myweb.paginationPageSize=5
